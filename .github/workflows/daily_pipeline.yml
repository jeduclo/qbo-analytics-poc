# ============================================================
# daily_pipeline.yml
# Runs the QBO ETL and ML scoring pipeline daily at 05:00 UTC.
# ============================================================

name: Daily Analytics Pipeline

on:
  schedule:
    - cron: '0 5 * * *'

  workflow_dispatch:
    inputs:
      skip_etl:
        description: 'Skip ETL and run scoring only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-daily-pipeline:
    name: ETL + ML Scoring
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # cache: 'pip'

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] \
            https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 2>&1 | tail -5
          echo "ODBC Driver 18 installed successfully."

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet
          echo "Dependencies installed."

      - name: Download latest trained model artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: weekly_retrain.yml
          name_is_regexp: true
          name: trained-models-.*
          path: models/
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: Run QBO ETL Pipeline
        if: ${{ github.event.inputs.skip_etl != 'true' }}
        env:
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
          QBO_CLIENT_ID:      ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET:  ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REALM_ID:       ${{ secrets.QBO_REALM_ID }}
          QBO_REFRESH_TOKEN:  ${{ secrets.QBO_REFRESH_TOKEN }}
          QBO_ENVIRONMENT:    ${{ secrets.QBO_ENVIRONMENT }}
        run: |
          echo "Starting QBO ETL at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python etl/qbo_etl.py
          echo "ETL completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Check model files and train if missing
        env:
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          if [ ! -f "models/overdue_classifier.pkl" ]; then
            echo "Model files not found. Loading synthetic data and training..."
            python synthetic_data/generate_qbo_data.py
            python etl/ml_train.py
          else
            echo "Model files found. Skipping training."
            ls -lh models/*.pkl
          fi

      - name: Run ML Scoring Pipeline
        env:
          AZURE_SQL_SERVER:   ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE: ${{ secrets.AZURE_SQL_DATABASE }}
          AZURE_SQL_USERNAME: ${{ secrets.AZURE_SQL_USERNAME }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: |
          echo "Starting ML scoring at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python etl/ml_score.py
          echo "ML scoring completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Pipeline completion summary
        if: always()
        run: |
          echo "================================================"
          echo "Daily Pipeline Summary"
          echo "Run time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger:  ${{ github.event_name }}"
          echo "Actor:    ${{ github.actor }}"
          echo "================================================"